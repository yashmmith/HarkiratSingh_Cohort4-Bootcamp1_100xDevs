<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>Flash card learning APP</h1>
    <div id="setup-screen">
  <h1>Flashcard App</h1>

  <label>Select Topic:</label>
  <select id="topic-select">
    <!-- options will be added by JS -->
  </select>

  <label>Number of Questions:</label>
  <input type="number" id="question-count" value="3" min="1" max="4" />

  <button onclick="startQuiz()">Start</button>
</div>
<div id="quiz-screen" style="display:none">
  <p id="question"></p>
  <p id="answer"></p>
  <button id="flip-btn" onclick="flipCard()">Flip</button>
  <div id="action-btns" style="display:none">
    <button onclick="nextCard(true)">Got it ✅</button>
    <button onclick="nextCard(false)">Missed ❌</button>
  </div>
</div>

<div id="result-screen" style="display:none">
  <p id="result-text"></p>
  <button onclick="restartQuiz()">Restart</button>
</div>
    <script src="script.js"></script>
</body>
</html>
